name: Magnesium
options:
  minimumXcodeGenVersion: 2.42.0
configFiles:
  Debug: config/Debug.xcconfig
  Release: config/Release.xcconfig
packages:
  #### Local Packages ####
  TorrentUI:
    path: Packages/Torrent
  Common:
    path: Packages/Common
  MagnesiumModule:
    path: Packages/MagnesiumModule
  #### Remote Packages ####
  Deluge:
    # path: ../Deluge-Swift
    url: https://github.com/NinjaLikesCheez/Deluge-Swift
    from: 2.0.0
  QBittorrent:
    # path: ../QBittorrent-Swift
    url: https://github.com/NinjaLikesCheez/QBittorrent-Swift
    from: 0.0.2
  swift-navigation:
    url: https://github.com/pointfreeco/swift-navigation
    from: 2.4.1
  ObservableDefaults:
    # path: ../../fatbobman/ObservableDefaults
    url: https://github.com/fatbobman/ObservableDefaults
    from: 1.7.0
  Logging:
    url: https://github.com/apple/swift-log
    from: 1.6.2
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 9.21.0
targets:
  Magnesium:
    type: application
    supportedDestinations: [iOS, tvOS, macOS, visionOS]
    deploymentTarget:
      iOS: 26
      tvOS: 26
      macOS: 26
      visionOS: 26
    sources:
      - Sources/Magnesium
    # Build settings (bundle ID, signing, display name, ...) live in the xcconfig files below —
    # add new settings there, not here.
    info:
      path: Sources/Magnesium/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: White
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    configFiles:
      Debug: config/Magnesium-Debug.xcconfig
      Release: config/Magnesium-Release.xcconfig
    dependencies:
      - package: Common
        products:
          - Common
          - CommonUI
      - package: TorrentUI
      - package: MagnesiumModule
      - package: Deluge
      - package: QBittorrent
      - package: Logging
      - package: ObservableDefaults
      - package: swift-navigation
        products:
          - SwiftNavigation
          - SwiftUINavigation
      - package: Sentry
        products:
          - SentrySPM
    scheme:
      testPlans:
        - path: Magnesium.xctestplan
          defaultPlan: true
      gatherCoverageData: true
      coverageTargets:
        - Magnesium
  MagnesiumTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, tvOS, macOS, visionOS]
    sources:
      - Tests
    dependencies:
      - target: Magnesium
      - package: Common
        product: Common
    settings:
      GENERATE_INFOPLIST_FILE: YES
