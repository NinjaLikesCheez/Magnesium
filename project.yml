name: Magnesium
options:
  minimumXcodeGenVersion: 2.42.0
configFiles:
  Debug: config/Debug.xcconfig
  Release: config/Release.xcconfig
packages:
  Deluge:
    path: ../Deluge-Swift
    # url: https://github.com/jameshurst/Deluge-Swift
    # branch: connected
  QBittorrent:
    path: ../QBittorrent-Swift
    # url: https://github.com/NinjaLikesCheez/QBittorrent-Swift
    # branch: main
  Logging:
    url: https://github.com/apple/swift-log
    from: 1.6.2
targets:
  Magnesium:
    type: application
    supportedDestinations: [iOS, tvOS, macOS, visionOS]
    deploymentTarget:
      iOS: 18.0
      tvOS: 18.0
      macOS: 15.0
      visionOS: 2.0
    sources:
      - Magnesium
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: ca.jameshurst.Magnesium
    info:
      path: Sources/Magnesium/Resources/Info.plist
      properties:
        CFBundleDisplayName: Magnesium
        CFBundleIdentifier: ca.jameshurst.Magnesium
        UILaunchScreen:
          UIColorName: White
    configFiles:
      Debug: config/Magnesium-Debug.xcconfig
      Release: config/Magnesium-Release.xcconfig
    dependencies:
      - package: Deluge
      - package: QBittorrent
      - package: Logging