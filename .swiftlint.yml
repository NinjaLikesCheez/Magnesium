disabled_rules:
  - trailing_comma
  - todo

line_length:
  ignores_comments: true

identifier_name:
  min_length: 2

# The nested Destination/Error enums inside a view's nested Model are the project's documented
# navigation pattern (see documentation/navigation.md), which is inherently 2 levels deep.
nesting:
  type_level: 2

# Thresholds below are sized to the codebase's existing (larger, but legitimate) test files
# rather than the SwiftLint defaults — comprehensive Swift Testing suites with many parameterized
# cases legitimately run long; splitting them isn't a mechanical lint fix.
file_length:
  warning: 900
type_body_length:
  warning: 600
function_body_length:
  warning: 65
cyclomatic_complexity:
  warning: 20
large_tuple:
  warning: 3