name: CI

on:
  push:
    branches: [main]
    paths: &ci-paths
      - "Sources/**"
      - "Tests/**"
      - "Packages/**"
      - "config/**"
      - "project.yml"
      - "Magnesium.xctestplan"
      - ".swift-format"
      - ".swiftlint.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths: *ci-paths
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Deployment target is OS 26 across platforms (see project.yml), so this needs an Xcode
  # new enough to ship the matching SDKs. "latest-stable" tracks whatever the runner image
  # offers; pin to a specific version here if a future toolchain change needs to be pinned.
  XCODE_VERSION: latest-stable

jobs:
  lint:
    name: Lint (swift-format, SwiftLint)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install linters
        run: |
          command -v swift-format >/dev/null || brew install swift-format
          command -v swiftlint >/dev/null || brew install swiftlint

      - name: swift-format lint
        run: swift-format lint --recursive Sources Tests Packages/*/Sources Packages/*/Tests

      - name: SwiftLint
        run: swiftlint lint --strict

  package-tests:
    name: Test package (${{ matrix.package }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          # Scheme names SwiftPM autogenerates aren't uniform: a single-product package
          # (MagnesiumModule) gets one scheme matching the package name, already configured
          # for the test action. A package with more than one product (Common) or none
          # matching its own name (Torrent) instead gets a "<Package>-Package" umbrella
          # scheme that bundles every target, tests included — the per-product schemes in
          # that case are build-only.
          - package: Common
            scheme: Common-Package
          - package: MagnesiumModule
            scheme: MagnesiumModule
          - package: Torrent
            scheme: Torrent-Package
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Trust SPM macros/plugins
        run: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-pkg-${{ matrix.package }}-${{ runner.os }}-${{ hashFiles(format('Packages/{0}/Package.resolved', matrix.package)) }}
          restore-keys: |
            deriveddata-pkg-${{ matrix.package }}-${{ runner.os }}-

      # Package code is iOS/visionOS-only (SwiftUI APIs like fullScreenCover aren't
      # available on macOS), so this builds against a simulator destination rather than
      # `swift test`, which would otherwise build and run natively as a macOS process.
      - name: xcodebuild test
        working-directory: Packages/${{ matrix.package }}
        run: |
          xcodebuild test \
            -scheme ${{ matrix.scheme }} \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  build:
    name: Build (${{ matrix.platform }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          # Generic destination (no specific simulator device/OS) since this job only
          # builds — a concrete destination risks "multiple devices matched" failures
          # when a runner image has more than one simulator matching the same name.
          - platform: iOS Simulator
            destination: "generic/platform=iOS Simulator"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Trust SPM macros/plugins
        run: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Install XcodeGen
        run: |
          command -v xcodegen >/dev/null || brew install xcodegen
          xcodegen version

      # Magnesium.xcodeproj is generated, not checked in (see .gitignore) — regenerate it
      # from project.yml before every build, same as local development.
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ matrix.platform }}-${{ runner.os }}-${{ hashFiles('**/Package.resolved', 'project.yml') }}
          restore-keys: |
            deriveddata-${{ matrix.platform }}-${{ runner.os }}-

      # config/Signing.xcconfig (gitignored, machine-specific) is what normally supplies
      # PRODUCT_BUNDLE_IDENTIFIER for the Magnesium/MagnesiumTests targets — write a
      # throwaway one here rather than passing it as an xcodebuild CLI override, which
      # would apply project-wide and collide with the embedded SPM package frameworks'
      # own bundle IDs (they'd all get forced to the same identifier as the app).
      - name: Write throwaway signing config
        run: echo "PRODUCT_BUNDLE_IDENTIFIER = dev.magnesium.ci" > config/Signing.xcconfig

      - name: Build
        run: |
          xcodebuild build \
            -project Magnesium.xcodeproj \
            -scheme Magnesium \
            -destination "${{ matrix.destination }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

  test:
    name: App test suite (MagnesiumTests)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Trust SPM macros/plugins
        run: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Install XcodeGen
        run: |
          command -v xcodegen >/dev/null || brew install xcodegen
          xcodegen version

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-test-${{ runner.os }}-${{ hashFiles('**/Package.resolved', 'project.yml') }}
          restore-keys: |
            deriveddata-test-${{ runner.os }}-

      # config/Signing.xcconfig (gitignored, machine-specific) is what normally supplies
      # PRODUCT_BUNDLE_IDENTIFIER for the Magnesium/MagnesiumTests targets — write a
      # throwaway one here rather than passing it as an xcodebuild CLI override, which
      # would apply project-wide and collide with the embedded SPM package frameworks'
      # own bundle IDs (they'd all get forced to the same identifier as the app, and
      # installing the built .app then fails: "parent bundle has the same identifier
      # as sub-bundle").
      - name: Write throwaway signing config
        run: echo "PRODUCT_BUNDLE_IDENTIFIER = dev.magnesium.ci" > config/Signing.xcconfig

      # There's no standalone "MagnesiumTests" scheme — it's a hosted test bundle that
      # only runs as part of the "Magnesium" scheme's test action (see Magnesium.xctestplan).
      - name: Run app-level tests
        run: |
          xcodebuild test \
            -project Magnesium.xcodeproj \
            -scheme Magnesium \
            -only-testing:MagnesiumTests \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
